name: Auto Reset Isolate

on:
  schedule:
    # 每小時的第 41 分鐘自動執行
    - cron: '41 * * * *'
  # 保留手動觸發按鈕，方便測試
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fast-redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 保留這段 Python 腳本，用來抓出現有的 KV 與 D1 ID，並產生 wrangler.ci.toml
      # 它不會重複創建資料庫，只會讀取現有 ID。
      - name: Fetch existing D1 + KV IDs and generate wrangler.ci.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python -u - <<'PY'
          import json
          import os
          import re
          import urllib.request
          
          token = os.environ.get("CLOUDFLARE_API_TOKEN", "")
          account_id = os.environ.get("CLOUDFLARE_ACCOUNT_ID", "")
          build_sha = os.environ.get("GITHUB_SHA", "") or "auto-reset"
          
          src_path = "wrangler.toml"
          dst_path = "wrangler.ci.toml"
          wrangler_text = open(src_path, "r", encoding="utf-8").read()

          def extract(pattern: str, fallback: str) -> str:
              m = re.search(pattern, wrangler_text)
              return m.group(1).strip() if m and m.group(1).strip() else fallback

          worker_name = extract(r'(?m)^name\s*=\s*"([^"]+)"\s*$', "grok2api")
          kv_title = f"{worker_name}-cache"
          d1_name = extract(r'(?m)^database_name\s*=\s*"([^"]+)"\s*$', worker_name)
          
          def request(method: str, url: str):
              headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
              req = urllib.request.Request(url, headers=headers, method=method)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8"))
          
          # 1. 抓取現有 KV ID
          kv_base = f"https://api.cloudflare.com/client/v4/accounts/{account_id}/storage/kv/namespaces"
          kv_id = None
          res_kv = request("GET", f"{kv_base}?per_page=100")
          for item in res_kv.get("result", []):
              if item.get("title") == kv_title:
                  kv_id = item.get("id")
                  break
                  
          # 2. 抓取現有 D1 ID
          d1_base = f"https://api.cloudflare.com/client/v4/accounts/{account_id}/d1/database"
          d1_id = None
          res_d1 = request("GET", f"{d1_base}?per_page=100")
          for item in res_d1.get("result", []):
              if item.get("name") == d1_name:
                  d1_id = item.get("uuid") or item.get("id")
                  break

          if not kv_id or not d1_id:
              raise RuntimeError(f"Missing KV or D1! (KV: {kv_id}, D1: {d1_id}). Run main deploy first.")

          # 3. 替換寫入 wrangler.ci.toml
          text2 = wrangler_text
          text2 = re.sub(r'REPLACE_WITH_KV_NAMESPACE_ID', kv_id, text2)
          text2 = re.sub(r'REPLACE_WITH_D1_DATABASE_ID', d1_id, text2)
          text2 = re.sub(r'(?ms)(\[\[kv_namespaces\]\].*?^\s*id\s*=\s*")[^"]*("\s*)$', lambda m: f"{m.group(1)}{kv_id}{m.group(2)}", text2)
          text2 = re.sub(r'(?ms)(\[\[d1_databases\]\].*?^\s*database_id\s*=\s*")[^"]*("\s*)$', lambda m: f"{m.group(1)}{d1_id}{m.group(2)}", text2)
          
          if re.search(r'(?m)^BUILD_SHA\s*=', text2):
              text2 = re.sub(r'(?m)^BUILD_SHA\s*=\s*"[^"]*"\s*$', f'BUILD_SHA = "{build_sha}"', text2)
          else:
              text2 = re.sub(r'(?m)^\[vars\]\s*$', f'[vars]\nBUILD_SHA = "{build_sha}"', text2, count=1)
              
          open(dst_path, "w", encoding="utf-8").write(text2)
          print("Successfully generated wrangler.ci.toml for fast redeploy.")
          PY

      # 略過 Migrations (因為 Schema 沒變)
      # 略過 Typecheck (能上 prod 的程式碼已經檢查過了)
      # 直接部署覆蓋，刷新 Cloudflare V8 Cache!
      - name: Deploy Worker (Reset Isolate)
        run: npx wrangler deploy --config wrangler.ci.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
